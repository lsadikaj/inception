
; Le nom du pool — "www" est le nom par défaut
[www]

; L'utilisateur et le groupe sous lesquels les processus PHP tournent
; www-data est l'utilisateur standard pour les serveurs web sur Debian
user = www-data
group = www-data

; L'adresse et le port sur lesquels PHP-FPM écoute les connexions
; 0.0.0.0:9000 signifie "écoute sur toutes les interfaces réseau sur le port 9000"
; C'est nécessaire pour que NGINX dans son conteneur séparé puisse se connecter
listen = 0.0.0.0:9000

; Ces deux directives définissent qui a le droit de se connecter à PHP-FPM
; On met www-data pour que les connexions venant de NGINX soient acceptées
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; La gestion du nombre de processus PHP
; "dynamic" signifie que PHP-FPM ajuste automatiquement le nombre de processus
pm = dynamic

; Le nombre maximum de processus PHP simultanés autorisés
pm.max_children = 5

; Le nombre de processus créés au démarrage de PHP-FPM
pm.start_servers = 2

; Le nombre minimum de processus gardés en attente quand c'est calme
pm.min_spare_servers = 1

; Le nombre maximum de processus gardés en attente quand c'est calme
pm.max_spare_servers = 3